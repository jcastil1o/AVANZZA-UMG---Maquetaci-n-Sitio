<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Avanzza — 404 No Encontrado</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#0F4C97',
                        'secondary': '#1E88E5',
                        'surface': '#f8fafc',
                    },
                    fontFamily: {
                        'headline': ['Outfit', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    },
                    borderRadius: {'4xl': '2rem'},
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .headline-font { font-family: 'Outfit', sans-serif; }
        .premium-shadow {
            box-shadow: 0 10px 40px -10px rgba(15, 76, 151, 0.1);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-800">

    <main class="w-full max-w-lg text-center space-y-12">
        <!-- Brand -->
        <div class="flex flex-col items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-2xl">bolt</span>
                </div>
                <h1 class="text-3xl font-black text-primary headline-font">Avanzza</h1>
            </div>
        </div>

        <!-- 404 Message -->
        <div class="space-y-6">
            <div class="relative inline-block">
                <span class="text-[12rem] font-black text-primary opacity-[0.05] leading-none select-none headline-font">404</span>
                <div class="absolute inset-0 flex items-center justify-center">
                    <h2 class="text-4xl font-black headline-font italic text-slate-800">Página no encontrada</h2>
                </div>
            </div>
            
            <p class="text-slate-500 font-medium leading-relaxed max-w-md mx-auto">
                Lo sentimos, el recurso que buscas no se encuentra en nuestra plataforma. Es posible que el enlace haya expirado o la dirección sea incorrecta.
            </p>
        </div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
            <a href="dashboard.html" class="w-full sm:w-auto px-10 py-5 bg-primary text-white rounded-2xl font-black text-xs uppercase tracking-widest shadow-xl shadow-primary/20 hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-sm">dashboard</span>
                Ir al Dashboard
            </a>
            <a href="javascript:history.back()" class="w-full sm:w-auto px-10 py-5 bg-white text-slate-500 border border-slate-100 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-slate-50 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
                Regresar
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="fixed bottom-12 w-full text-center">
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
            © <span id="current-year">2026</span> AVANZZA. TODOS LOS DERECHOS RESERVADOS.
        </p>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
