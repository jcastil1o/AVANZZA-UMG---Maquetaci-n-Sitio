<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Avanzza UMG — 404 No Encontrado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#192338',
                        'secondary': '#1E2E4F',
                        'tertiary': '#31487A',
                        'accent-blue': '#8FB3E2',
                        'surface': '#f0f4fb',
                    },
                    fontFamily: {
                        'sans': ['Manrope', 'sans-serif'],
                        'serif': ['DM Serif Display', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #f0f4fb;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(143, 179, 226, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(49, 72, 122, 0.05) 0%, transparent 40%);
        }
        .editorial-title {
            letter-spacing: -0.02em;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6 text-primary">

    <main class="w-full max-w-lg text-center space-y-12">
        <!-- Brand -->
        <div class="flex flex-col items-center gap-4">
            <div class="w-16 h-16 bg-white rounded-2xl shadow-xl flex items-center justify-center border border-primary/5">
                <img src="assets/Logo.jpeg" alt="Logo" class="w-10 h-10 object-contain rounded-lg">
            </div>
            <h1 class="font-serif italic text-2xl">Avanzza UMG</h1>
        </div>

        <!-- 404 Message -->
        <div class="space-y-6">
            <div class="relative inline-block">
                <span class="text-[12rem] font-black opacity-[0.03] leading-none select-none">404</span>
                <div class="absolute inset-0 flex items-center justify-center">
                    <h2 class="text-4xl font-extrabold editorial-title italic">Archivo no encontrado</h2>
                </div>
            </div>
            
            <p class="text-secondary/60 font-medium leading-relaxed max-w-md mx-auto">
                Lo sentimos, el documento o sección que busca no se encuentra en nuestro repositorio digital actual. Por favor, verifique la dirección e intente de nuevo.
            </p>
        </div>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
            <a href="/dashboard.html" class="w-full sm:w-auto px-8 py-4 bg-primary text-white rounded-xl font-black text-[10px] uppercase tracking-widest shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined">dashboard</span>
                Ir al Dashboard
            </a>
            <a href="javascript:history.back()" class="w-full sm:w-auto px-8 py-4 bg-white text-primary border border-primary/10 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-primary/5 transition-all flex items-center justify-center gap-3">
                <span class="material-symbols-outlined">arrow_back</span>
                Regresar
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="fixed bottom-8 w-full text-center">
        <p class="text-[8px] font-bold text-primary/30 uppercase tracking-[0.4em] editorial-title">
            © <span id="current-year">2026</span> AVANZZA UMG — Academic Excellence Curator
        </p>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();
    </script>
</body>

</html>
